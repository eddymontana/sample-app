apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
  namespace: prod
  labels:
    app: production-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: production-deployment
  template:
    metadata:
      labels:
        app: production-deployment
    spec:
      containers:
      - name: production-deployment
        image: europe-west1-docker.pkg.dev/qwiklabs-gcp-02-e64e7551736f/my-repository/sample-app-prod:v1.0
        ports:
        - containerPort: 8080
